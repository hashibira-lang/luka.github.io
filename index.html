<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>中国城市旅游攻略 | 发现最美中国</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans', sans-serif;
        }

        body {
            background: #f8fafc;
            color: #1e293b;
            line-height: 1.5;
        }

        /* 头部导航 */
        .header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            padding: 2rem 1.5rem;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 2.2rem;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }

        /* 主容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* 城市卡片网格 */
        .city-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .city-card {
            background: white;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.02);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }

        .city-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.15);
        }

        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #cbd5e1;
            display: block;
        }

        .card-content {
            padding: 1.5rem;
        }

        .city-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .city-name span {
            background: #eef2ff;
            color: #1e40af;
            font-size: 0.8rem;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-weight: normal;
        }

        .city-desc {
            color: #475569;
            margin-bottom: 1.2rem;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .btn-guide {
            background: #f59e0b;
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        .btn-guide:hover {
            background: #d97706;
        }
        /* 详情区域 */
        .detail-section {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-top: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
        }

        .detail-title {
            font-size: 1.6rem;
            font-weight: 700;
            border-left: 5px solid #f59e0b;
            padding-left: 1rem;
            margin-bottom: 1.2rem;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
        }

        .info-card {
            background: #f8fafc;
            border-radius: 1rem;
            padding: 1rem;
        }

        .info-card h3 {
            font-size: 1.2rem;
            margin-bottom: 0.75rem;
            color: #0f172a;
            border-bottom: 2px solid #e2e8f0;
            display: inline-block;
        }

        .info-card ul, .info-card p {
            font-size: 0.9rem;
            color: #334155;
            margin-top: 0.5rem;
        }

        .info-card li {
            margin-left: 1.2rem;
            margin-bottom: 0.3rem;
        }

        .badge-season {
            background: #dcfce7;
            color: #15803d;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-size: 0.8rem;
            display: inline-block;
        }

        footer {
            text-align: center;
            padding: 2rem 1rem;
            color: #64748b;
            font-size: 0.8rem;
            border-top: 1px solid #e2e8f0;
            margin-top: 2rem;
        }

        @media (max-width: 640px) {
            .header h1 { font-size: 1.8rem; }
            .container { padding: 1rem; }
            .city-grid { gap: 1.2rem; }
            .detail-title { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏯 中国城市旅游攻略</h1>
        <p>精选热门目的地 · 本地人推荐玩法 · 四季皆宜出发</p>
    </div>

    <div class="container">
        <div class="city-grid" id="cityGrid"></div>
        <div id="detailPanel" class="detail-section" style="display: none;"></div>
    </div>

    <footer>
        🌟 所有攻略信息来自实地整理，仅供参考 | 祝你旅途愉快
    </footer>

    <script>
        // ---------- 城市数据库 ----------
        const citiesData = [
            {
                id: 1,
                name: "北京",
                shortDesc: "六朝古都，古今交融",
                image: "https://picsum.photos/id/104/400/250",  // 长城风格的随机图
                detail: {
                    attractions: ["故宫博物院", "八达岭长城", "天坛", "颐和园", "南锣鼓巷"],
                    food: ["北京烤鸭", "炸酱面", "豆汁焦圈", "涮羊肉", "驴打滚"],
                    bestSeason: "春秋两季（4-5月，9-10月）",
                    tips: "建议故宫提前7天预约；长城尽量早上去避开人流。",
                    itinerary: "D1: 天安门+故宫+景山公园；D2: 长城+鸟巢水立方夜景；D3: 颐和园+北大清华门口打卡"
                }
            },
            {
                id: 2,
                name: "上海",
                shortDesc: "摩登之都，海派风情",
                image: "https://picsum.photos/id/96/400/250",
                detail: {
                    attractions: ["外滩", "迪士尼乐园", "豫园", "南京路步行街", "武康路"],
                    food: ["小笼包", "生煎包", "本帮红烧肉", "蟹粉豆腐", "排骨年糕"],
                    bestSeason: "春秋最佳（3-5月，9-11月）",
                    tips: "外滩夜景必看；迪士尼避开周末；武康路适合Citywalk。",
                    itinerary: "D1: 豫园+城隍庙+南京路+外滩；D2: 迪士尼全天；D3: 新天地+田子坊"
                }
            },
            {
                id: 3,
                name: "西安",
                shortDesc: "千年古都，梦回长安",
                image: "https://picsum.photos/id/123/400/250",
                detail: {
                    attractions: ["兵马俑", "大雁塔", "西安城墙", "回民街", "大唐不夜城"],
                    food: ["肉夹馍", "凉皮", "羊肉泡馍", "biangbiang面", "甑糕"],
                    bestSeason: "3-6月，9-11月",
                    tips: "兵马俑请导游讲解更有意思；城墙上可以租自行车骑行。",
                    itinerary: "D1: 兵马俑+华清宫；D2: 城墙+钟鼓楼+回民街；D3: 大雁塔+大唐不夜城"
                }
            },
            {
                id: 4,
                name: "成都",
                shortDesc: "天府之国，巴适得板",
                image: "https://picsum.photos/id/127/400/250",
                detail: {
                    attractions: ["大熊猫繁育基地", "宽窄巷子", "锦里", "都江堰", "青城山"],
                    food: ["火锅", "串串香", "担担面", "夫妻肺片", "蛋烘糕"],
                    bestSeason: "全年皆宜，3-6月及9-11月最佳",
                    tips: "看熊猫尽量上午去；火锅点微辣；人民公园喝茶体验慢生活。",
                    itinerary: "D1: 熊猫基地+宽窄巷子；D2: 都江堰+青城山；D3: 武侯祠+锦里+人民公园"
                }
            },
            {
                id: 5,
                name: "桂林",
                shortDesc: "山水甲天下",
                image: "https://picsum.photos/id/20/400/250",
                detail: {
                    attractions: ["漓江", "阳朔西街", "遇龙河", "龙脊梯田", "象鼻山"],
                    food: ["桂林米粉", "啤酒鱼", "田螺酿", "荔浦扣肉", "马蹄糕"],
                    bestSeason: "4-10月（雨季山水更美）",
                    tips: "漓江精华段（杨堤-兴坪）；遇龙河竹筏比漓江更宁静。",
                    itinerary: "D1: 桂林市区+象鼻山+两江四湖；D2: 漓江+阳朔西街；D3: 遇龙河+银子岩"
                }
            },
            {
                id: 6,
                name: "长沙",
                shortDesc: "星城热辣，不夜之城",
                image: "https://picsum.photos/id/169/400/250",
                detail: {
                    attractions: ["岳麓山", "橘子洲头", "湖南省博物馆", "太平老街", "IFS国金中心"],
                    food: ["臭豆腐", "口味虾", "糖油粑粑", "剁椒鱼头", "米粉"],
                    bestSeason: "春秋最佳，夏季较热但夜生活丰富",
                    tips: "省博看辛追夫人需提前预约；橘子洲建议坐小火车。",
                    itinerary: "D1: 岳麓山+岳麓书院+大学城美食；D2: 橘子洲+省博+四方坪夜市；D3: 文和友+坡子街+解放西"
                }
            }
        ];
        // 渲染城市卡片
        const cityGrid = document.getElementById('cityGrid');
        const detailPanel = document.getElementById('detailPanel');

        function buildCards() {
            cityGrid.innerHTML = '';
            citiesData.forEach(city => {
                const card = document.createElement('div');
                card.className = 'city-card';
                card.innerHTML = `
                    <img class="card-img" src="${city.image}" alt="${city.name}" loading="lazy">
                    <div class="card-content">
                        <div class="city-name">
                            ${city.name}
                            <span>${city.shortDesc}</span>
                        </div>
                        <div class="city-desc">${city.shortDesc} · 等你来探索</div>
                        <button class="btn-guide" data-id="${city.id}">📖 查看攻略</button>
                    </div>
                `;
                cityGrid.appendChild(card);
            });

            // 绑定按钮事件 (委托)
            cityGrid.addEventListener('click', (e) => {
                const btn = e.target.closest('.btn-guide');
                if (btn) {
                    const id = parseInt(btn.getAttribute('data-id'));
                    showCityDetail(id);
                }
            });
        }

        // 展示详细攻略
        function showCityDetail(cityId) {
            const city = citiesData.find(c => c.id === cityId);
            if (!city) return;

            const d = city.detail;
            detailPanel.style.display = 'block';
            detailPanel.innerHTML = `
                <div class="detail-title">🗺️ ${city.name} · 保姆级攻略</div>
                <div class="detail-grid">
                    <div class="info-card">
                        <h3>🌟 必游景点</h3>
                        <ul>
                            ${d.attractions.map(place => `<li>${place}</li>`).join('')}
                        </ul>
                    </div>
                    <div class="info-card">
                        <h3>🍜 地道美食</h3>
                        <ul>
                            ${d.food.map(f => `<li>${f}</li>`).join('')}
                        </ul>
                    </div>
                    <div class="info-card">
                        <h3>📅 最佳季节</h3>
                        <p><span class="badge-season">${d.bestSeason}</span></p>
                        <h3 style="margin-top: 12px;">💡 实用贴士</h3>
                        <p>${d.tips}</p>
                    </div>
                    <div class="info-card">
                        <h3>🚶 经典三日游</h3>
                        <p>${d.itinerary}</p>
                    </div>
                </div>
                <div style="margin-top: 16px; text-align: right; font-size: 0.8rem; color: #94a3b8;">
                    ⚡ 点击其他城市按钮可查看不同攻略
                </div>
            `;
            // 滚动到详情区域，提升体验
            detailPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // 初始化默认显示第一个城市的攻略（可选）
        buildCards();
        // 默认展示北京攻略，让页面刚加载时有内容
        showCityDetail(1);
    </script>
</body>
</html>
